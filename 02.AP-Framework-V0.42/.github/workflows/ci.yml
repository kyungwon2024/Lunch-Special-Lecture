# [실전 노트]
# - npm install을 사용 (npm ci는 package-lock.json이 없으면 실패)
# - Frontend는 tsc --noEmit으로 타입 체크만 (next build는 동적 라우트와 충돌 가능)
# - 배포는 Vercel 등 외부 서비스 권장 (GitHub Pages는 정적 전용)
# - Jest에 --forceExit 필수 (비동기 핸들러 미정리 시 무한 대기 방지)
# - tests/ 디렉토리에서 실행 시 의존성을 별도 설치해야 함

