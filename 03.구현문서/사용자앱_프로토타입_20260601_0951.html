  <!-- ═══════════════════════════════════════════════════════════════
       Tweaks Panel — Floating control panel (drag, dismiss)
       ═══════════════════════════════════════════════════════════════ -->
  <script type="text/babel">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;background:rgba(250,249,247,.78);color:#29261b;-webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;min-height:0}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;border-radius:6px;cursor:pointer;padding:4px 6px;line-height:1.2}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;background:rgba(0,0,0,.15);transition:background .15s;cursor:pointer;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-fab{position:fixed;right:18px;bottom:18px;z-index:2147483645;width:48px;height:48px;border-radius:9999px;border:none;cursor:pointer;background:rgba(31,41,55,0.92);color:#fff;font-size:18px;box-shadow:0 8px 24px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center}
  .twk-fab:hover{background:#111827}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((k, v) => setValues(prev => ({ ...prev, [k]: v })), []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      {!open && (
        <button className="twk-fab" onClick={() => setOpen(true)} aria-label="Open tweaks">
          ⚙
        </button>
      )}
      {open && (
        <div className="twk-panel">
          <div className="twk-hd">
            <b>{title}</b>
            <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
          </div>
          <div className="twk-body">{children}</div>
        </div>
      )}
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}

function TweakRadio({ label, value, options, onChange }) {
  const idx = Math.max(0, options.indexOf(value));
  const n = options.length;
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-seg">
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {options.map(o => (
          <button key={o} type="button" onClick={() => onChange(o)}>{o}</button>
        ))}
      </div>
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button className="twk-toggle" data-on={value ? '1' : '0'} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle });
  </script>

function Icon({ name, size = 24, color = 'currentColor', strokeWidth, fill = 'none', style = {} }) {
  const sw = strokeWidth || (size >= 24 ? 1.6 : 2);
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color}
      strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"
      style={{ flexShrink: 0, ...style }}
      dangerouslySetInnerHTML={{ __html: ICON_PATHS[name] || '' }} />
  );
}

function FoodPlaceholder({ special, ratio = '4 / 3', rounded = 0, label = true, fill = false }) {
  const cat = CATEGORIES[special.cat];
  const h = cat.hue;
  const c1 = `hsl(${h} 72% 90%)`;
  const c2 = `hsl(${h} 70% 84%)`;
  const ink = `hsl(${h} 55% 32%)`;
  return (
    <div style={{
      position: 'relative', width: '100%',
      ...(fill ? { height: '100%' } : { aspectRatio: ratio }),
      borderRadius: rounded, overflow: 'hidden',
      background: `repeating-linear-gradient(135deg, ${c1} 0 14px, ${c2} 14px 28px)`,
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8,
    }}>
      <div style={{ fontSize: 40, lineHeight: 1, filter: 'saturate(1.1)' }}>{cat.emoji}</div>
      {label && (
        <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.02em', color: ink, background: 'rgba(255,255,255,0.62)', padding: '3px 9px', borderRadius: 6, maxWidth: '78%', textAlign: 'center', fontWeight: 600 }}>{special.menu}</div>
      )}
      <div style={{ position: 'absolute', bottom: 7, right: 9, fontFamily: 'var(--font-mono)', fontSize: 8.5, letterSpacing: '0.12em', color: ink, opacity: 0.55, textTransform: 'uppercase' }}>photo</div>
    </div>
  );
}

function StatusBadge({ status, size = 'md' }) {
  const m = STATUS_META[status];
  const map = {
    success: { dot: 'var(--success)', text: 'var(--success)', bg: 'var(--success-bg)' },
    warning: { dot: 'var(--warning)', text: 'var(--warning)', bg: 'var(--warning-bg)' },
    gray:    { dot: 'var(--gray-400)', text: 'var(--gray-500)', bg: 'var(--gray-100)' },
  }[m.token];
  const fs = size === 'sm' ? 11 : 12;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, background: map.bg, color: map.text, borderRadius: 'var(--radius-full)', padding: size === 'sm' ? '3px 8px' : '4px 10px', fontWeight: 600, fontSize: `calc(${fs}px * var(--font-scale))`, lineHeight: 1 }}>
      <span style={{ width: 7, height: 7, borderRadius: 9999, background: map.dot, boxShadow: status !== 'closed' ? `0 0 0 3px ${map.bg}` : 'none' }} />
      {m.label}
    </span>
  );
}

function DiscountBadge({ pct, big = false }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', background: 'var(--brand-accent)', color: '#fff', fontWeight: 800, borderRadius: 'var(--radius-full)', padding: big ? '5px 12px' : '4px 9px', fontSize: `calc(${big ? 15 : 13}px * var(--font-scale))`, letterSpacing: '-0.01em', boxShadow: '0 2px 8px rgba(255,87,34,0.35)' }} className="tnum">-{pct}%</span>
  );
}

function CategoryTag({ cat }) {
  const c = CATEGORIES[cat];
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, flexShrink: 0, whiteSpace: 'nowrap', background: 'var(--brand-primary-light)', color: 'var(--brand-primary-dark)', borderRadius: 'var(--radius-md)', padding: '3px 8px', fontWeight: 600, fontSize: 'calc(12px * var(--font-scale))', lineHeight: 1.1 }}><span>{c.emoji}</span><span>{c.label}</span></span>
  );
}

function Button({ variant = 'primary', size = 'md', children, onClick, disabled, fullWidth, leadingIcon, style = {} }) {
  const [press, setPress] = useState(false);
  const variants = {
    primary:   { bg: 'var(--brand-primary)', color: '#fff', border: 'none', shadow: '0 4px 14px rgba(255,167,38,0.36)' },
    secondary: { bg: 'transparent', color: 'var(--brand-primary-dark)', border: '1.5px solid var(--brand-primary)', shadow: 'none' },
    tertiary:  { bg: 'var(--gray-100)', color: 'var(--gray-700)', border: 'none', shadow: 'none' },
    danger:    { bg: 'var(--danger)', color: '#fff', border: 'none', shadow: 'none' },
    ghost:     { bg: 'transparent', color: 'var(--brand-primary-dark)', border: 'none', shadow: 'none' },
  }[variant];
  const sizes = { sm: { h: 36, px: 14, fs: 13 }, md: { h: 46, px: 18, fs: 15 }, lg: { h: 56, px: 24, fs: 17 } }[size];
  const isDis = disabled;
  return (
    <button onClick={isDis ? undefined : onClick} disabled={isDis}
      onPointerDown={() => setPress(true)} onPointerUp={() => setPress(false)} onPointerLeave={() => setPress(false)}
      style={{
        height: sizes.h, padding: `0 ${sizes.px}px`, width: fullWidth ? '100%' : undefined,
        background: isDis ? 'var(--gray-200)' : variants.bg, color: isDis ? 'var(--gray-400)' : variants.color,
        border: isDis ? 'none' : variants.border, borderRadius: 'var(--radius-lg)',
        fontFamily: 'var(--font-sans)', fontWeight: 600, letterSpacing: '0.01em',
        fontSize: `calc(${sizes.fs}px * var(--font-scale))`,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        cursor: isDis ? 'not-allowed' : 'pointer', boxShadow: isDis ? 'none' : variants.shadow,
        transform: press && !isDis ? 'scale(0.97)' : 'scale(1)',
        transition: 'transform var(--motion-fast), background var(--motion-fast)',
        ...style,
      }}>
      {leadingIcon && <Icon name={leadingIcon} size={size === 'lg' ? 20 : 18} />}
      {children}
    </button>
  );
}

function Toast({ toast }) {
  if (!toast) return null;
  const tone = {
    success: { bg: 'var(--success)', icon: 'check' },
    info:    { bg: 'var(--gray-800)', icon: 'bell' },
    warning: { bg: 'var(--warning)', icon: 'flame' },
    danger:  { bg: 'var(--danger)', icon: 'x' },
  }[toast.tone || 'info'];
  return (
    <div style={{ position: 'absolute', top: 64, left: '50%', transform: 'translateX(-50%)', zIndex: 400, width: 'calc(100% - 32px)', maxWidth: 360, background: tone.bg, color: '#fff', borderRadius: 'var(--radius-lg)', padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 10, boxShadow: 'var(--shadow-lg)', animation: 'toastIn 300ms ease-out', fontSize: 'calc(14px * var(--font-scale))', fontWeight: 500 }}>
      <Icon name={tone.icon} size={18} />
      <span style={{ flex: 1 }}>{toast.msg}</span>
    </div>
  );
}

Object.assign(window, { Icon, FoodPlaceholder, StatusBadge, DiscountBadge, CategoryTag, Button, Toast });
  </script>

  <script type="text/babel">
const labelStyle = { fontSize: 'calc(13px * var(--font-scale))', fontWeight: 700, color: 'var(--gray-700)' };
const inputStyle = { width: '100%', height: 46, padding: '0 14px', borderRadius: 'var(--radius-lg)', border: '1px solid var(--gray-200)', background: 'var(--surface-2)', color: 'var(--gray-900)', fontSize: 'calc(15px * var(--font-scale))', fontFamily: 'var(--font-sans)', outline: 'none', fontWeight: 600 };

function VerifyScreen({ s, onClose, onVerified }) {
  const [step, setStep] = useState(1);
  const [phone, setPhone] = useState('010-1234-5678');
  const [code, setCode] = useState(['', '', '', '', '', '']);
  const [secs, setSecs] = useState(180);
  const refs = [useRef(), useRef(), useRef(), useRef(), useRef(), useRef()];

  useEffect(() => {
    if (step !== 2 || secs <= 0) return;
    const t = setTimeout(() => setSecs(secs - 1), 1000);
    return () => clearTimeout(t);
  }, [step, secs]);

  const mm = String(Math.floor(secs / 60)).padStart(1, '0');
  const ss = String(secs % 60).padStart(2, '0');
  const filled = code.every(c => c !== '');

  function setDigit(i, v) {
    v = v.replace(/\D/g, '').slice(-1);
    const next = [...code]; next[i] = v; setCode(next);
    if (v && i < 5) refs[i + 1].current && refs[i + 1].current.focus();
  }

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 200, background: 'var(--surface-0)', display: 'flex', flexDirection: 'column', animation: 'sheetUp 300ms ease-out' }}>

          </div>
          <div style={{ fontSize: 'calc(20px * var(--font-scale))', fontWeight: 800, color: 'var(--gray-900)' }}>쿠폰 발급 전 본인 인증</div>

function QRMatrix({ seed, size = 220 }) {
  const N = 25;
  const cell = size / N;
  let h = 0; for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
  function rand(i) { const x = Math.sin(h + i * 12.9898) * 43758.5453; return x - Math.floor(x); }
  const cells = [];
  function finder(ox, oy) {
    for (let y = 0; y < 7; y++) for (let x = 0; x < 7; x++) {
      const on = x === 0 || x === 6 || y === 0 || y === 6 || (x >= 2 && x <= 4 && y >= 2 && y <= 4);
      if (on) cells.push([ox + x, oy + y]);
    }
  }
  finder(0, 0); finder(N - 7, 0); finder(0, N - 7);
  for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
    const inFinder = (x < 8 && y < 8) || (x > N - 9 && y < 8) || (x < 8 && y > N - 9);
    if (inFinder) continue;
    if (rand(y * N + x) > 0.55) cells.push([x, y]);
  }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: 'block' }}>
      <rect width={size} height={size} fill="#fff" />
      {cells.map(([x, y], i) => <rect key={i} x={x * cell} y={y * cell} width={cell + 0.5} height={cell + 0.5} fill="#111827" />)}
    </svg>
  );
}

function QRScreen({ cp, special, onClose, onRedeemed }) {

    const t = setTimeout(() => setSecs(secs - 1), 1000);
    return () => clearTimeout(t);
  }, [secs]);

  const R = 150, C = 2 * Math.PI * R, off = C * (1 - secs / 60);
  const low = secs <= 10;

  return (

  { id: 'n3', icon: 'ticket', tone: 'success', title: '쿠폰 발급 완료', body: '본죽 삼계 전복 삼계죽 쿠폰이 쿠폰함에 담겼어요.', time: '40분 전', unread: false },
  { id: 'n4', icon: 'check', tone: 'success', title: '쿠폰 사용 완료', body: '미도리 라멘에서 2,400원 할인받았어요.', time: '어제', unread: false },
  { id: 'n5', icon: 'bell', tone: 'info', title: '점심특강 공지', body: '6월 한 달간 신규 매장 등록 수수료가 면제됩니다.', time: '2일 전', unread: false },
];

function NotiScreen({ onBell, onSettings }) {
  const [notis, setNotis] = useState(NOTIS_DATA);
  const toneMap = {
    brand: { bg: 'var(--brand-primary-light)', fg: 'var(--brand-primary-dark)' },
    accent: { bg: 'var(--danger-bg)', fg: 'var(--brand-accent)' },
    success: { bg: 'var(--success-bg)', fg: 'var(--success)' },
    info: { bg: 'var(--info-bg)', fg: 'var(--info)' },
  };
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--surface-0)' }}>
      <AppHeader title="알림" onBell={onBell} onSettings={onSettings} />
      <div style={{ display: 'flex', justifyContent: 'flex-end', padding: '8px 16px 0' }}>
        <button onClick={() => setNotis(notis.map(n => ({ ...n, unread: false })))} style={{ border: 'none', background: 'transparent', color: 'var(--brand-primary-dark)', fontWeight: 600, fontSize: 'calc(13px * var(--font-scale))', cursor: 'pointer', fontFamily: 'var(--font-sans)' }}>모두 읽음</button>
      </div>
      <div className="app-scroll" style={{ flex: 1, padding: '6px 16px 20px' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {notis.map(n => {
            const tm = toneMap[n.tone];
            return (
              <div key={n.id} onClick={() => setNotis(notis.map(x => x.id === n.id ? { ...x, unread: false } : x))}
                style={{ display: 'flex', gap: 12, padding: 13, background: n.unread ? 'var(--brand-primary-light)' : 'var(--surface-2)', borderRadius: 'var(--radius-lg)', border: '1px solid var(--gray-100)', cursor: 'pointer', position: 'relative' }}>
                {n.unread && <span style={{ position: 'absolute', top: 14, left: 4, width: 6, height: 6, borderRadius: 9999, background: 'var(--brand-accent)' }} />}
                <div style={{ width: 38, height: 38, borderRadius: 10, background: tm.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <Icon name={n.icon} size={20} color={tm.fg} />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8 }}>
                    <span style={{ fontSize: 'calc(14px * var(--font-scale))', fontWeight: 700, color: 'var(--gray-900)' }}>{n.title}</span>
                    <span style={{ fontSize: 'calc(11px * var(--font-scale))', color: 'var(--gray-400)', flexShrink: 0 }}>{n.time}</span>
                  </div>
                  <div style={{ fontSize: 'calc(13px * var(--font-scale))', color: 'var(--gray-600)', marginTop: 3, lineHeight: 1.45 }}>{n.body}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function SettingRow({ icon, label, children, last }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px', borderBottom: last ? 'none' : '1px solid var(--gray-100)' }}>
      <Icon name={icon} size={20} color="var(--gray-500)" />
      <span style={{ flex: 1, fontSize: 'calc(15px * var(--font-scale))', color: 'var(--gray-800)', fontWeight: 500 }}>{label}</span>
      {children}
    </div>
  );
}
function Switch({ on, onToggle }) {
  return (
    <button onClick={onToggle} aria-label="toggle" style={{ width: 48, height: 28, borderRadius: 9999, border: 'none', cursor: 'pointer', background: on ? 'var(--brand-primary)' : 'var(--gray-300)', position: 'relative', transition: 'background var(--motion-normal)', flexShrink: 0 }}>
      <span style={{ position: 'absolute', top: 3, left: on ? 23 : 3, width: 22, height: 22, borderRadius: 9999, background: '#fff', transition: 'left var(--motion-normal)', boxShadow: '0 1px 3px rgba(0,0,0,0.3)' }} />
    </button>
  );
}

function MyScreen({ tweaks, setTweak, onBell, onSettings, couponCount }) {
  const scales = [['표준', 1], ['큰 글씨', 1.25], ['매우 큼', 1.5]];
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--surface-0)' }}>
      <AppHeader title="마이" onBell={onBell} onSettings={onSettings} />
      <div className="app-scroll" style={{ flex: 1, padding: '16px 16px 24px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, padding: 16, background: 'var(--surface-2)', borderRadius: 'var(--radius-xl)', boxShadow: 'var(--shadow-sm)', border: '1px solid var(--gray-100)' }}>
          <div style={{ width: 54, height: 54, borderRadius: 9999, background: 'linear-gradient(135deg, var(--brand-primary), var(--brand-accent))', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24 }}>🧑‍💼</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 'calc(17px * var(--font-scale))', fontWeight: 800, color: 'var(--gray-900)' }}>김대리</div>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 'calc(12px * var(--font-scale))', color: 'var(--success)', fontWeight: 600, marginTop: 3 }}>
              <Icon name="shield" size={13} color="var(--success)" /> 본인 인증 완료
            </div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10, marginTop: 12 }}>
          {[['보유 쿠폰', couponCount + '장'], ['이번 달 절약', '14,200원'], ['방문 매장', '7곳']].map(([k, v]) => (
            <div key={k} style={{ flex: 1, padding: 13, background: 'var(--surface-2)', borderRadius: 'var(--radius-lg)', border: '1px solid var(--gray-100)', textAlign: 'center' }}>
              <div className="tnum" style={{ fontSize: 'calc(18px * var(--font-scale))', fontWeight: 800, color: 'var(--brand-primary-dark)' }}>{v}</div>
              <div style={{ fontSize: 'calc(11px * var(--font-scale))', color: 'var(--gray-500)', marginTop: 3 }}>{k}</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 'calc(12px * var(--font-scale))', fontWeight: 700, color: 'var(--gray-400)', textTransform: 'uppercase', letterSpacing: '0.06em', margin: '22px 6px 8px' }}>화면 설정</div>
        <div style={{ background: 'var(--surface-2)', borderRadius: 'var(--radius-lg)', border: '1px solid var(--gray-100)', overflow: 'hidden' }}>
          <div style={{ padding: '14px 16px', borderBottom: '1px solid var(--gray-100)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 11 }}>
              <Icon name="user" size={20} color="var(--gray-500)" />
              <span style={{ fontSize: 'calc(15px * var(--font-scale))', color: 'var(--gray-800)', fontWeight: 500 }}>큰 글씨 모드</span>
            </div>
            <div style={{ display: 'flex', gap: 6 }}>
              {scales.map(([lbl, val]) => {
                const on = tweaks.fontScale === val;
                return (
                  <button key={val} onClick={() => setTweak('fontScale', val)}
                    style={{ flex: 1, padding: '9px 0', borderRadius: 'var(--radius-md)', border: on ? '1.5px solid var(--brand-primary)' : '1px solid var(--gray-200)', background: on ? 'var(--brand-primary-light)' : 'var(--surface-2)', color: on ? 'var(--brand-primary-dark)' : 'var(--gray-600)', fontWeight: on ? 700 : 500, fontSize: 'calc(13px * var(--font-scale))', cursor: 'pointer', fontFamily: 'var(--font-sans)' }}>{lbl}</button>
                );
              })}
            </div>
          </div>
          <SettingRow icon="settings" label="다크 모드">
            <Switch on={tweaks.dark} onToggle={() => setTweak('dark', !tweaks.dark)} />
          </SettingRow>
          <SettingRow icon="bell" label="점심시간 푸시 알림" last>
            <Switch on={tweaks.push} onToggle={() => setTweak('push', !tweaks.push)} />
          </SettingRow>
        </div>
        <div style={{ fontSize: 'calc(12px * var(--font-scale))', fontWeight: 700, color: 'var(--gray-400)', textTransform: 'uppercase', letterSpacing: '0.06em', margin: '22px 6px 8px' }}>계정</div>
        <div style={{ background: 'var(--surface-2)', borderRadius: 'var(--radius-lg)', border: '1px solid var(--gray-100)', overflow: 'hidden' }}>
          <SettingRow icon="ticket" label="쿠폰 사용 내역"><Icon name="chevRight" size={18} color="var(--gray-300)" /></SettingRow>
          <SettingRow icon="heart" label="즐겨찾기"><Icon name="chevRight" size={18} color="var(--gray-300)" /></SettingRow>
          <SettingRow icon="shield" label="개인정보 · 약관" last><Icon name="chevRight" size={18} color="var(--gray-300)" /></SettingRow>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { ExploreScreen, NotiScreen, MyScreen });
  </script>

  <!-- ═══════════════════════════════════════════════════════════════
       App — Orchestrator (state, overlay stack, tweaks integration)
       ═══════════════════════════════════════════════════════════════ -->
  <script type="text/babel">
const TWEAK_DEFAULTS = {
  cardLayout: '표준',
  fontScale: 1,
  dark: false,
  push: true,
  celebration: true,
};
const LAYOUT_KEY = { '표준': 'standard', '컴팩트': 'compact', '매거진': 'magazine' };
const SCALE_LABEL = { 1: '표준', 1.25: '큼', 1.5: '매우 큼' };
const LABEL_SCALE = { '표준': 1, '큼': 1.25, '매우 큼': 1.5 };

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = useState('feed');
  const [sort, setSort] = useState('거리순');
  const [coupons, setCoupons] = useState(PRESET_COUPONS);
  const [verified, setVerified] = useState(false);
  const [detail, setDetail] = useState(null);
  const [verify, setVerify] = useState(null);
  const [celebrate, setCelebrate] = useState(null);
  const [qr, setQR] = useState(null);
  const [redeem, setRedeem] = useState(null);
  const [toast, setToast] = useState(null);

  const getSpecial = (id) => SPECIALS.find(s => s.id === id);
  const availCount = coupons.filter(c => c.status === 'available').length;
  const notiCount = 2;

  function showToast(msg, tone = 'info') {
    setToast({ msg, tone });
    setTimeout(() => setToast(null), 2600);
  }

  const sortedSpecials = useMemo(() => {
    const arr = [...SPECIALS];
    if (sort === '거리순') arr.sort((a, b) => a.dist - b.dist);
    else if (sort === '할인율순') arr.sort((a, b) => discountPct(b) - discountPct(a));
    else if (sort === '인기순') arr.sort((a, b) => b.rating - a.rating);
    else if (sort === '즉시입장') arr.sort((a, b) => parseInt(a.prep) - parseInt(b.prep));
    return arr;
  }, [sort]);

  function handleGetCoupon(s) {
    if (!verified) { setVerify(s); return; }
    issueCoupon(s);
  }
  function handleVerified() {
    const s = verify;
    setVerified(true);
    setVerify(null);
    issueCoupon(s);
  }
  function issueCoupon(s) {
    setDetail(null);
    setCelebrate(s);
  }
  function handleCelebrateDone() {
    const s = celebrate;
    const newCp = { id: 'cp-' + Date.now(), specialId: s.id, status: 'available', issuedAt: '방금', expireIn: 168 };
    setCoupons(prev => [newCp, ...prev]);
    setCelebrate(null);
    setTab('coupons');
  }
  function handleRedeemed() {
    const cp = qr;
    setRedeem(getSpecial(cp.specialId));
    setQR(null);
  }
  function handleRedeemDone() {
    const sp = redeem;
    setCoupons(prev => prev.map(c => (c.specialId === sp.id && c.status === 'available') ? { ...c, status: 'used', usedAt: '방금' } : c));
    setRedeem(null);
    showToast('쿠폰을 사용했어요. 맛있게 드세요! 🍽', 'success');
  }

  const cardLayout = LAYOUT_KEY[t.cardLayout] || 'standard';

  return (
    <IOSDevice dark={t.dark}>
      <div className="app-screen" data-theme={t.dark ? 'dark' : 'light'} style={{ '--font-scale': t.fontScale }}>
        <div style={{ position: 'absolute', inset: 0 }}>
          {tab === 'feed' && (
            <FeedScreen specials={sortedSpecials} cardLayout={cardLayout} sort={sort} onSort={setSort}
              onTapSpecial={setDetail} onBell={() => setTab('noti')} onSettings={() => setTab('my')} notiCount={notiCount} />
          )}
          {tab === 'explore' && (
            <ExploreScreen specials={sortedSpecials} onTapSpecial={setDetail}
              onBell={() => setTab('noti')} onSettings={() => setTab('my')} notiCount={notiCount} />
          )}
          {tab === 'coupons' && (
            <CouponsScreen coupons={coupons} getSpecial={getSpecial} onShowQR={setQR}
              onBrowse={() => setTab('feed')} onBell={() => setTab('noti')} onSettings={() => setTab('my')} notiCount={notiCount} />
          )}
          {tab === 'noti' && <NotiScreen onBell={() => {}} onSettings={() => setTab('my')} />}
          {tab === 'my' && <MyScreen tweaks={t} setTweak={setTweak} onBell={() => setTab('noti')} onSettings={() => {}} couponCount={availCount} />}
        </div>
        <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, zIndex: 35 }}>
          <BottomTab active={tab} onChange={setTab} couponCount={availCount} notiCount={notiCount} />
        </div>
        {detail && (
          <div style={{ position: 'absolute', inset: 0, zIndex: 40, animation: 'screenIn 300ms ease-out' }}>
            <DetailScreen s={detail} onBack={() => setDetail(null)} onGetCoupon={handleGetCoupon}
              soldOut={detail.status === 'closed' || detail.remain <= 0} />
          </div>
        )}
        {verify && (
          <div style={{ position: 'absolute', inset: 0, zIndex: 42 }}>
            <VerifyScreen s={verify} onClose={() => setVerify(null)} onVerified={handleVerified} />
          </div>
        )}
        {celebrate && <CouponCelebration s={celebrate} enabled={t.celebration} onDone={handleCelebrateDone} />}
        {qr && (
          <div style={{ position: 'absolute', inset: 0, zIndex: 44 }}>
            <QRScreen cp={qr} special={getSpecial(qr.specialId)} onClose={() => setQR(null)} onRedeemed={handleRedeemed} />
          </div>
        )}
        {redeem && <RedeemFlash special={redeem} enabled={t.celebration} onDone={handleRedeemDone} />}
        <Toast toast={toast} />
        {ReactDOM.createPortal(
          <TweaksPanel title="Tweaks">
            <TweakSection label="메인 피드 카드" />
            <TweakRadio label="카드 레이아웃" value={t.cardLayout} options={['표준', '컴팩트', '매거진']}
              onChange={v => setTweak('cardLayout', v)} />
            <TweakSection label="화면" />
            <TweakRadio label="글씨 크기" value={SCALE_LABEL[t.fontScale] || '표준'} options={['표준', '큼', '매우 큼']}
              onChange={v => setTweak('fontScale', LABEL_SCALE[v])} />
            <TweakToggle label="다크 모드" value={t.dark} onChange={v => setTweak('dark', v)} />
            <TweakSection label="모션" />
            <TweakToggle label="발급·사용 축하 효과" value={t.celebration} onChange={v => setTweak('celebration', v)} />
          </TweaksPanel>,
          document.body
        )}
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('device-mount')).render(<App />);
  </script>

  <script>
    // Fit the 402×874 phone into the viewport
    function fitPhone() {
      const scaleWrap = document.getElementById('phone-scale');
      if (!scaleWrap) return;
      const W = 402, H = 874;
      const availW = window.innerWidth - 32;
      const availH = window.innerHeight - 48;
      const scale = Math.min(availW / W, availH / H, 1);
      scaleWrap.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', fitPhone);
    setTimeout(fitPhone, 100);
    setTimeout(fitPhone, 600);
  </script>
</body>
</html>
